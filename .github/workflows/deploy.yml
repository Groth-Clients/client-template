name: Deploy to Hetzner

on:
  repository_dispatch:
    types: [provision, deploy]
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          SLUG="${{ github.event.client_payload.slug || github.event.repository.name }}"
          PORT="${{ github.event.client_payload.port || '3100' }}"
          REPO_URL="https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git"
          CYBERPANEL_PASS="${{ github.event.client_payload.cyberpanel_pass }}"

          if [ "${{ github.event_name }}" = "repository_dispatch" ] && [ "${{ github.event.action }}" = "provision" ]; then
            ssh -i ~/.ssh/deploy_key deploy@${{ secrets.HETZNER_HOST }} "/opt/groth/provision.sh '$SLUG' '$PORT' '$REPO_URL' '$CYBERPANEL_PASS'"
          elif [ "${{ github.event_name }}" = "push" ]; then
            ssh -i ~/.ssh/deploy_key deploy@${{ secrets.HETZNER_HOST }} "[ -d /var/www/clients/$SLUG ] && cd /var/www/clients/$SLUG && git pull origin main && npm ci && npm run build && pm2 restart client-$SLUG || echo 'Site not provisioned yet, skipping deploy'"
          fi

      - name: Notify portal (provision only)
        if: github.event_name == 'repository_dispatch' && github.event.action == 'provision'
        run: |
          curl -X POST "${{ secrets.PORTAL_CALLBACK_URL }}/api/portal/admin/provision/callback" \
            -H "Authorization: Bearer ${{ secrets.PORTAL_WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"clientId\":\"${{ github.event.client_payload.client_id }}\",\"status\":\"active\",\"siteUrl\":\"https://${{ github.event.client_payload.slug }}.groth.agency\"}"
